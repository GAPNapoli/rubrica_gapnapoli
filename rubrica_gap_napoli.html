<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rubrica Telefonica GAP Napoli</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GAP Napoli">
    <meta name="theme-color" content="#002d72">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="ChatGPT Image 18 ott 2025, 11_50_58.png">
    <link rel="apple-touch-icon" sizes="180x180" href="ChatGPT Image 18 ott 2025, 11_50_58.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXQRQFFDLL"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* ── TEMA ───────────────────────────────────────────────────────────── */
    :root {
        --bg-grad-start: #002d72;
        --bg-grad-end:   #001f4d;
        --surface:       rgba(255,255,255,0.10);
        --surface-hover: rgba(255,255,255,0.16);
        --border:        rgba(255,255,255,0.15);
        --text:          #ffffff;
        --text-muted:    rgba(255,255,255,0.65);
        --input-bg:      rgba(255,255,255,0.12);
        --input-border:  rgba(255,255,255,0.25);
        --btn-bg:        #ffffff;
        --btn-text:      #002d72;
        --btn-hover:     #f0f4ff;
        --wa-green:      #25D366;
        --wa-hover:      #128C7E;
        --call-bg:       rgba(52,199,89,0.55);
        --call-hover:    rgba(52,199,89,0.75);
        --save-bg:       rgba(0,86,179,0.60);
        --save-hover:    rgba(0,86,179,0.80);
        --copy-bg:       rgba(255,255,255,0.20);
        --copy-hover:    rgba(255,255,255,0.32);
        --error:         #ff6b6b;
        --warn:          #ffcc00;
        --notif-border:  #25D366;
    }
    [data-theme="light"] {
        --bg-grad-start: #e8f0fe;
        --bg-grad-end:   #c7d8f8;
        --surface:       rgba(255,255,255,0.75);
        --surface-hover: rgba(255,255,255,0.92);
        --border:        rgba(0,45,114,0.20);
        --text:          #002d72;
        --text-muted:    rgba(0,45,114,0.55);
        --input-bg:      rgba(255,255,255,0.80);
        --input-border:  rgba(0,45,114,0.35);
        --btn-bg:        #002d72;
        --btn-text:      #ffffff;
        --btn-hover:     #003d99;
        --copy-bg:       #4a6fa5;
        --copy-hover:    #3a5a8f;
        --call-bg:       #28a745;
        --call-hover:    #1e8035;
        --save-bg:       #0056b3;
        --save-hover:    #004494;
        --wa-green:      #1da851;
        --wa-hover:      #157a3c;
        --error:         #c0392b;
        --warn:          #b7860b;
        --notif-border:  #002d72;
    }

    /* ── RESET ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; height: 100%; overflow-x: hidden; }

    body {
        font-family: 'Montserrat', Arial, sans-serif;
        min-height: 100%;
        display: flex; flex-direction: column; align-items: center;
        color: var(--text); transition: color .3s;
        background-color: #002d72;
    }
    [data-theme="light"] body { background-color: #c7d8f8; }
    body::after {
        content: ''; position: fixed; inset: 0; z-index: -1;
        background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
        transition: background .4s;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────────────── */
    .page-container {
        width: 100%; max-width: 100%;
        display: flex; flex-direction: column; align-items: center;
        padding: 20px 15px 20px; min-height: 100vh;
        -webkit-overflow-scrolling: touch;
    }

    /* ── TOGGLE TEMA ────────────────────────────────────────────────────── */
    .theme-toggle {
        position: fixed; top: 14px; right: 14px; z-index: 200;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 50%; width: 40px; height: 40px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; cursor: pointer; backdrop-filter: blur(8px);
        transition: background .25s, transform .2s;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .theme-toggle:hover { transform: scale(1.1); background: var(--surface-hover); }

    /* ── LOGOUT ─────────────────────────────────────────────────────────── */
    .logout-btn {
        position: fixed; top: 14px; left: 14px; z-index: 200;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 13px;
        font-size: 13px; font-weight: 600; color: var(--text);
        cursor: pointer; backdrop-filter: blur(8px);
        display: none; align-items: center; gap: 6px;
        transition: background .25s, transform .2s;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
        min-height: auto !important; width: auto !important;
    }
    .logout-btn:hover { background: var(--surface-hover); transform: scale(1.03); }

    /* ── LOGHI ──────────────────────────────────────────────────────────── */
    .logo-container {
        display: flex; align-items: center; justify-content: center;
        gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
        margin-top: 60px;
    }
    @media (min-width: 600px) {
        .logo-container { margin-top: 20px; }
    }
    .logo-left  img { max-width: 100px; height: auto; }
    .logo-right img { max-width: 130px; height: auto; }

    /* ── LOGIN ──────────────────────────────────────────────────────────── */
    .login-wrapper {
        width: 100%; max-width: 400px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        flex: 1; padding: 20px 0;
        transition: opacity .4s ease, transform .4s ease;
    }
    .login-wrapper.fade-out { opacity: 0; transform: translateY(-10px); pointer-events: none; }
    .login-title {
        font-size: 26px; font-weight: 700; margin-bottom: 22px;
        text-align: center; width: 100%;
    }
    .login-form { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    @media (min-width: 480px) { .login-form { flex-direction: row; gap: 10px; } }
    .input-group  { flex: 1; display: flex; flex-direction: column; }
    .button-group { display: flex; width: 100%; }
    .button-group .login-button { width: 100%; }
    @media (min-width: 480px) {
        .button-group { width: auto; }
        .button-group .login-button { width: auto; }
    }
    input {
        width: 100%; padding: 13px 16px;
        background: var(--input-bg); color: var(--text);
        border: 2px solid var(--input-border); border-radius: 8px;
        font-size: 16px; font-family: inherit; outline: none;
        transition: border-color .25s, background .25s, box-shadow .25s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: var(--text); background: var(--surface-hover); }
    [data-theme="light"] input:focus { box-shadow: 0 0 0 3px rgba(0,45,114,.12); }
    .login-button {
        background: var(--btn-bg); color: var(--btn-text);
        border: none; border-radius: 8px; cursor: pointer;
        padding: 13px 28px; font-size: 15px; font-weight: 700;
        font-family: inherit; display: flex; align-items: center;
        justify-content: center; gap: 8px; min-height: 50px;
        transition: background .2s, transform .15s;
    }
    .login-button:hover { background: var(--btn-hover); }
    .spinner {
        width: 18px; height: 18px; display: none;
        border: 2px solid var(--btn-text); border-top-color: transparent;
        border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
        color: var(--error); font-size: 13px; font-weight: 600;
        margin-top: 10px; display: none; text-align: center;
    }
    .lockout-timer {
        color: var(--warn); font-size: 13px; font-weight: 600;
        margin-top: 6px; display: none; text-align: center;
    }

    /* ── MAIN ───────────────────────────────────────────────────────────── */
    .main-wrapper {
        width: 100%; max-width: 640px;
        display: none; flex-direction: column; align-items: center;
        opacity: 0; transition: opacity .4s ease;
        box-sizing: border-box;
    }
    @media (max-width: 639px) {
        .main-wrapper { max-width: 100%; }
    }
    .main-wrapper.show { opacity: 1; }
    .title-section { text-align: center; margin-bottom: 22px; width: 100%; }
    .main-title { font-size: 28px; font-weight: 800; letter-spacing: .5px; }
    .sub-title   { font-size: 15px; opacity: .75; margin-top: 4px; }

    /* ── SEARCH ─────────────────────────────────────────────────────────── */
    .search-container { width: 100%; margin-bottom: 18px; }
    #result { width: 100%; }
    .search-row {
        display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch;
    }
    .search-wrapper { position: relative; flex: 1; }
    #searchInput { padding-right: 38px; width: 100%; }
    .clear-btn {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--text-muted);
        font-size: 16px; cursor: pointer; display: none; padding: 4px;
        min-height: auto !important; width: auto !important;
    }
    .search-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-secondary {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); flex: 1;
        border-radius: 8px; padding: 10px; font-size: 13px;
        font-weight: 600; font-family: inherit; cursor: pointer;
        transition: background .2s;
    }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-voice {
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px; padding: 10px; font-size: 13px;
        font-weight: 600; font-family: inherit; cursor: pointer;
        flex: 1; transition: background .2s;
    }
    .btn-voice.recording {
        border-color: rgba(220,53,69,.6);
        animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
        0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,.4); }
        50%      { box-shadow: 0 0 0 5px rgba(220,53,69,0); }
    }

    /* ── RICERCHE RECENTI ────────────────────────────────────────────────── */
    .recent-searches { margin-bottom: 12px; display: none; }
    .recent-label {
        font-size: 12px; font-weight: 600; opacity: .65;
        margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    .recent-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .recent-chip {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 20px; padding: 5px 12px;
        font-size: 13px; cursor: pointer; color: var(--text);
        transition: background .2s; min-height: auto !important; width: auto !important;
        display: flex; align-items: center; gap: 6px;
        font-family: inherit;
    }
    .recent-chip:hover { background: var(--surface-hover); }
    .recent-chip .chip-del { opacity: .5; font-size: 15px; line-height: 1; padding: 0 2px; }
    .recent-chip .chip-del:hover { opacity: 1; color: var(--error); }

    /* ── RISULTATI ───────────────────────────────────────────────────────── */
    .result-count {
        text-align: center; font-size: 13px; font-weight: 600;
        opacity: .7; margin-bottom: 12px;
    }
    .result-item {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 10px; padding: 16px; margin-bottom: 10px;
        transition: transform .2s, background .2s, box-shadow .2s;
    }
    .result-item:hover { transform: translateY(-1px); background: var(--surface-hover); box-shadow: 0 4px 14px rgba(0,0,0,.1); }
    .no-results {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 10px; backdrop-filter: blur(8px);
        padding: 30px; text-align: center; opacity: .75;
    }

    /* ── INDICE ALFABETICO ───────────────────────────────────────────────── */
    .alpha-index {
        display: flex; flex-wrap: wrap; gap: 4px;
        margin-bottom: 14px; justify-content: center;
    }
    .alpha-btn {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 9px;
        font-size: 13px; font-weight: 700; color: var(--text);
        cursor: pointer; min-height: auto !important; width: auto !important;
        transition: background .2s; font-family: inherit;
    }
    .alpha-btn:hover { background: var(--surface-hover); }
    .alpha-btn.active {
        background: var(--btn-bg); color: var(--btn-text);
        border-color: var(--btn-bg);
    }

    /* ── CONTATTO ────────────────────────────────────────────────────────── */
    .contact-info { display: flex; flex-direction: column; gap: 10px; }
    .contact-details { min-width: 0; }
    .contact-details strong { display: block; margin-bottom: 4px; font-size: 15px; }
    .contact-details span   { font-size: 13px; color: var(--text-muted); }
    .no-phone { font-style: italic; }

    /* ── BOTTONI AZIONE ──────────────────────────────────────────────────── */
    /* 3 bottoni sempre in fila orizzontale, uguali su mobile e desktop */
    .action-buttons {
        display: flex; flex-direction: row; gap: 6px; width: 100%;
    }
    .action-buttons button,
    .action-buttons a {
        display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        padding: 11px 6px; font-weight: 600; font-size: 13px; border-radius: 6px;
        text-decoration: none; border: none; cursor: pointer;
        transition: background .2s; flex: 1;
        min-height: 44px !important; white-space: nowrap; font-family: inherit;
    }
    @media (min-width: 640px) {
        .contact-info {
            flex-direction: row; align-items: center;
            justify-content: space-between; gap: 16px;
        }
        .contact-details { flex: 1; min-width: 0; }
        .action-buttons {
            width: auto; flex-shrink: 0;
        }
        .action-buttons button,
        .action-buttons a { flex: none; padding: 9px 14px; }
    }
    .copy-button      { background: var(--copy-bg);  color: #fff; border: 1px solid transparent !important; }
    .copy-button:hover{ background: var(--copy-hover); }
    .call-button      { background: var(--call-bg);  color: #fff; border: 1px solid transparent !important; }
    .call-button:hover{ background: var(--call-hover); }
    .save-button      { background: var(--save-bg);  color: #fff; border: 1px solid transparent !important; }
    .save-button:hover{ background: var(--save-hover); }
    .whatsapp-button      { background: var(--wa-green); color: #fff; border: 1px solid transparent !important; }
    .whatsapp-button:hover{ background: var(--wa-hover); }
    .action-buttons svg {
        width: 15px !important; height: 15px !important;
        flex-shrink: 0; display: inline-block !important;
    }
    .copy-button svg { filter: brightness(0) invert(1); }
    .call-button svg, .save-button svg, .whatsapp-button svg { filter: brightness(0) invert(1); }

    /* ── HIGHLIGHT TESTO CERCATO ─────────────────────────────────────────── */
    mark {
        background: rgba(255,200,0,0.45); color: inherit;
        border-radius: 3px; padding: 0 1px;
    }
    [data-theme="light"] mark { background: rgba(255,160,0,0.40); }

    /* ── CARICA ALTRI ───────────────────────────────────────────────────── */
    .load-more-wrap { text-align: center; margin-top: 8px; margin-bottom: 16px; }
    .load-more-btn  { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; }

    /* ── TOAST ──────────────────────────────────────────────────────────── */
    .notification {
        position: fixed; top: 16px; right: 16px;
        background: var(--btn-bg); color: var(--btn-text);
        padding: 13px 17px; border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0,0,0,.18); font-weight: 600;
        z-index: 1000; transform: translateX(120%); transition: transform .3s ease;
        border-left: 4px solid var(--notif-border); max-width: 300px;
    }
    .notification.show  { transform: translateX(0); }
    .notification.error { border-left-color: var(--error); }

    .hidden { display: none; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .3s ease both; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
        .page-container { padding: 14px 11px; }
        .login-wrapper  { padding: 10px 0; }
        .logo-left img  { max-width: 88px; }
        .logo-right img { max-width: 115px; }
        input, .login-button, button { min-height: 46px; }
    }
    @media (max-width: 360px) {
        .logo-container { flex-direction: column; gap: 10px; }
        .login-title    { font-size: 22px; }
    }
    @media (min-width: 768px)  { .main-wrapper { max-width: 720px; } }
    @media (min-width: 1025px) { .main-wrapper { max-width: 820px; } .page-container { padding: 36px 28px; } }
    @media (max-height: 500px) and (orientation: landscape) {
        .logo-left img { max-width: 65px; } .logo-right img { max-width: 95px; }
        .login-title { font-size: 20px; margin-bottom: 12px; }
        .logo-container { margin-bottom: 12px; }
    }
    @supports (padding: max(0px)) {
        .page-container {
            padding-left:  max(15px, env(safe-area-inset-left));
            padding-right: max(15px, env(safe-area-inset-right));
        }
    }
    </style>
</head>
<body>

<button class="logout-btn" id="logoutBtn" onclick="eseguiLogout()">🚪 Esci</button>
<button class="theme-toggle" id="themeToggle" title="Cambia tema">🌙</button>

<div class="page-container">

    <!-- LOGIN -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="logo-container">
            <div class="logo-left"><img src="ChatGPT Image 18 ott 2025, 11_50_58.png" alt="GAP Napoli"></div>
            <div class="logo-right"><img id="logoFipLogin" src="2.png" alt="FIP CIA Campania"></div>
        </div>
        <div style="width:100%;text-align:center;">
            <div class="login-title">🔐 Accesso Rubrica</div>
            <div class="login-form">
                <div class="input-group">
                    <input type="password" id="tesseraInput" placeholder="Numero di Tessera FIP" autocomplete="off">
                </div>
                <div class="button-group">
                    <button class="login-button" id="loginBtn" onclick="verificaTessera()">
                        <span id="loginBtnText">Accedi</span>
                        <div class="spinner" id="loginSpinner"></div>
                    </button>
                </div>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="lockout-timer" id="lockoutTimer"></div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-wrapper" id="mainWrapper">
        <div class="logo-container">
            <div class="logo-left"><img src="ChatGPT Image 18 ott 2025, 11_50_58.png" alt="GAP Napoli"></div>
            <div class="logo-right"><img id="logoFipMain" src="2.png" alt="FIP CIA Campania"></div>
        </div>
        <div class="title-section">
            <div class="main-title">🏀 GAP NAPOLI 🏀</div>
            <div class="sub-title">📞 Rubrica Telefonica 📞</div>
        </div>
        <div class="search-container">
            <div class="search-row">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Cerca per nome o cognome..." autocomplete="off">
                    <button class="clear-btn" id="clearBtn" onclick="svuotaRicerca()" title="Cancella">✕</button>
                </div>
                <button onclick="eseguiRicerca()" style="flex-shrink:0;padding:12px 18px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;">🔍 Cerca</button>
            </div>
            <div class="search-actions">
                <button class="btn-secondary" onclick="mostraTutti()">📋 Mostra tutti</button>
                <button class="btn-voice" id="voiceBtn" onclick="avviaVoce()">🎙️ Voce</button>
            </div>
            <!-- RICERCHE RECENTI -->
            <div class="recent-searches" id="recentSearches">
                <div class="recent-label">🕐 Ricerche recenti</div>
                <div class="recent-chips" id="recentChips"></div>
            </div>
        </div>
        <div id="result"></div>
    </div>
</div>

<a id="vcardDownload" class="hidden" download="contatto.vcf"></a>

function applicaTema(theme, salva) {
    const html = document.documentElement;
    if (theme === 'light') {
        html.setAttribute('data-theme', 'light');
        html.style.background = 'linear-gradient(135deg, #e8f0fe 0%, #c7d8f8 100%)';

    document.getElementById('themeToggle').textContent = theme === 'light' ? '🌙' : '☀️';

}

    applicaTema(saved || sys, false);
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {

// ── CRYPTO ───────────────────────────────────────────────────────────────────
function b64ToBytes(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function derivaChiave(tessera, saltB64) {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(tessera.trim()), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:b64ToBytes(saltB64), iterations:PBKDF2_ITER, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
}

async function decifraAESBytes(k, nb, cb) {
    return crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(nb) }, k, b64ToBytes(cb));
}

async function decifraAES(k, nb, cb) {
    return new TextDecoder().decode(await decifraAESBytes(k, nb, cb));
}

async function sha256(msg) {
    const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
async function verificaTessera() {
    if (lockoutAttivo) return;
    const input   = document.getElementById('tesseraInput').value.trim();
    const errorEl = document.getElementById('errorMessage');
    const btn     = document.getElementById('loginBtn');
    const spinner = document.getElementById('loginSpinner');
    const btnTxt  = document.getElementById('loginBtnText');

    if (!input) { errorEl.textContent='Inserisci il numero di tessera.'; errorEl.style.display='block'; return; }
    btn.disabled=true; btnTxt.style.display='none'; spinner.style.display='block'; errorEl.style.display='none';

    try {
        const varianti = [input];
        if (!input.toUpperCase().startsWith('A0')) varianti.push('A0'+input);
        let trovato = false;

        for (const v of varianti) {
            const h = await sha256(v);
            if (!(h in PACCHETTI_TESSERE)) continue;
            const pkt = PACCHETTI_TESSERE[h];
            try {
                const kdf       = await derivaChiave(v, pkt.salt);
                const masterBuf = await decifraAESBytes(kdf, pkt.nonce, pkt.ct);
                const master    = await crypto.subtle.importKey('raw', masterBuf, {name:'AES-GCM'}, false, ['decrypt']);
                const json      = await decifraAES(master, RUBRICA_CIFRATA.nonce, RUBRICA_CIFRATA.ct);
                rubricaDecifrata = JSON.parse(json);
                trovato = true; tentativiFalliti = 0;

                const lw = document.getElementById('loginWrapper');
                const mw = document.getElementById('mainWrapper');
                lw.classList.add('fade-out');
                setTimeout(() => {
                    lw.style.display='none'; mw.style.display='flex';
                    void mw.offsetWidth; mw.classList.add('show');
                    window.scrollTo(0,0);
                    document.getElementById('searchInput').focus();
                    mostraNotifica('Benvenuto ' + (pkt.nome||'Utente') + '! 👋');
                    document.getElementById('logoutBtn').style.display = 'flex';
                    aggiornaRicentiUI();
                }, 420);
                break;
            } catch(_) {}
        }

        if (!trovato) {
            tentativiFalliti++;
            if (tentativiFalliti >= 5) { avviaLockout(); }
            else {
                errorEl.textContent = `Tessera non valida. Tentativi rimasti: ${5-tentativiFalliti}`;
                errorEl.style.display='block';
            }
            document.getElementById('tesseraInput').value='';
            document.getElementById('tesseraInput').focus();
        }
    } catch(e) {
        errorEl.textContent='Errore durante la verifica. Riprova.'; errorEl.style.display='block';
    } finally {
        btn.disabled=false; btnTxt.style.display='block'; spinner.style.display='none';
    }
}

function avviaLockout() {
    lockoutAttivo=true; let s=30;
    const eEl=document.getElementById('errorMessage'), tEl=document.getElementById('lockoutTimer'), btn=document.getElementById('loginBtn');
    eEl.textContent='Troppi tentativi falliti.'; eEl.style.display='block';
    tEl.style.display='block'; btn.disabled=true;
    const iv=setInterval(()=>{
        tEl.textContent=`Riprova tra ${s} secondi...`; s--;
        if(s<0){ clearInterval(iv); lockoutAttivo=false; tentativiFalliti=0; btn.disabled=false; tEl.style.display='none'; eEl.style.display='none'; document.getElementById('tesseraInput').focus(); }
    },1000);
}

// ── RICERCHE RECENTI ──────────────────────────────────────────────────────────
function getRicenti() {
    try { return JSON.parse(sessionStorage.getItem('gap-recenti') || '[]'); }
    catch(_) { return []; }
}
function aggiungiRecente(query) {
    if (!query || query.length < 2) return;
    let r = getRicenti().filter(x => x.toLowerCase() !== query.toLowerCase());
    r.unshift(query);
    sessionStorage.setItem('gap-recenti', JSON.stringify(r.slice(0, MAX_RECENTI)));
    aggiornaRicentiUI();
}
function rimuoviRecente(query) {
    sessionStorage.setItem('gap-recenti', JSON.stringify(getRicenti().filter(r => r !== query)));
    aggiornaRicentiUI();
}
function aggiornaRicentiUI() {
    const recenti   = getRicenti();
    const container = document.getElementById('recentSearches');
    const chips     = document.getElementById('recentChips');
    if (!recenti.length) { container.style.display = 'none'; return; }
    container.style.display = 'block';
    chips.innerHTML = recenti.map(r =>
        `<button class="recent-chip" onclick="usaRecente('${r.replace(/'/g,"\'")}')">
            ${r.replace(/</g,'&lt;')}
            <span class="chip-del" onclick="event.stopPropagation();rimuoviRecente('${r.replace(/'/g,"\'")}')">✕</span>
         </button>`
    ).join('');
}
function usaRecente(query) {
    document.getElementById('searchInput').value = query;
    document.getElementById('clearBtn').style.display = 'block';
    eseguiRicerca();
}

// ── RICERCA ──────────────────────────────────────────────────────────────────
function rimuoviAccenti(s) { return s.normalize('NFD').replace(/[̀-ͯ]/g,''); }

function levenshtein(a, b) {
    const m=a.length, n=b.length;
    const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
}

function punteggio(nomeLower, inputLower) {
    if (nomeLower === inputLower)         return 0;
    if (nomeLower.startsWith(inputLower)) return 1;
    if (nomeLower.includes(inputLower))   return 2;
    return 99;
}

function eseguiRicerca() {
    const raw = document.getElementById('searchInput').value.trim();
    document.getElementById('clearBtn').style.display = raw ? 'block' : 'none';
    if (!raw || !rubricaDecifrata) { document.getElementById('result').innerHTML=''; return; }

    const inputN     = rimuoviAccenti(raw.toLowerCase());
    const inputParti = inputN.split(/\s+/);
    const risultati  = [];

    // Fase 1: ricerca normale
    for (const nomeCompleto in rubricaDecifrata) {
        const nomeN   = rimuoviAccenti(nomeCompleto.toLowerCase());
        const parti   = nomeN.split(/\s+/);
        let   score   = 99;

        score = Math.min(score, punteggio(nomeN, inputN));
        if (inputParti.every(p => nomeN.includes(p))) score = Math.min(score, 2);
        if (inputParti.length === 2) {
            if (nomeN === inputParti[1]+' '+inputParti[0]) score = 0;
        }
        if (inputParti.length === 1 && inputN.length >= 2) {
            const iniziali = parti.map(p => p[0]||'').join('');
            if (iniziali.startsWith(inputN)) score = Math.min(score, 2);
        }
        if (score < 99) risultati.push({ nome:nomeCompleto, telefono:rubricaDecifrata[nomeCompleto], score });
    }

    // Fase 2: Levenshtein solo se nessun risultato
    if (risultati.length === 0 && inputN.length >= 4) {
        for (const nomeCompleto in rubricaDecifrata) {
            const nomeN   = rimuoviAccenti(nomeCompleto.toLowerCase());
            const parti   = nomeN.split(/\s+/);
            const cognome = parti[0]||'';
            const nomeP   = parti[1]||'';
            for (const p of inputParti) {
                if (p.length < 4) continue;
                const d = Math.min(levenshtein(cognome, p), levenshtein(nomeP, p));
                if (d <= (p.length <= 5 ? 1 : 2)) {
                    risultati.push({ nome:nomeCompleto, telefono:rubricaDecifrata[nomeCompleto], score:5 });
                    break;
                }
            }
        }
    }

    risultati.sort((a,b) => a.score!==b.score ? a.score-b.score : a.nome.localeCompare(b.nome,'it'));
    risultatiCorrente = risultati;
    paginaCorrente    = 0;
    ricercaCorrente   = raw;
    aggiungiRecente(raw);
    renderRisultati(true);
}

function mostraTutti() {
    if (!rubricaDecifrata) return;
    document.getElementById('searchInput').value='';
    document.getElementById('clearBtn').style.display='none';
    ricercaCorrente = '';
    risultatiCorrente = Object.entries(rubricaDecifrata)
        .map(([nome,tel]) => ({nome,telefono:tel,score:0}))
        .sort((a,b) => a.nome.localeCompare(b.nome,'it'));
    paginaCorrente = 0;
    renderRisultati(true);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderRisultati(reset=false) {
    const resultDiv = document.getElementById('result');
    const totale    = risultatiCorrente.length;

    if (totale === 0) {
        resultDiv.innerHTML = `<div class="no-results fade-in">Nessun risultato trovato.<br><small>Prova con un nome diverso</small></div>`;
        return;
    }

    const inizio = paginaCorrente * PER_PAGINA;
    const fetta  = risultatiCorrente.slice(inizio, inizio + PER_PAGINA);
    const labelTot = totale===1 ? 'Trovato 1 contatto' : `Trovati ${totale} contatti`;

    // Indice alfabetico solo su "Mostra tutti"
    let indiceHtml = '';
    if (!ricercaCorrente && totale > 20) {
        const lettere = [...new Set(risultatiCorrente.map(r => r.nome[0].toUpperCase()))].sort();
        indiceHtml = `<div class="alpha-index">${lettere.map(l =>
            `<button class="alpha-btn" onclick="saltaALettera('${l}')">${l}</button>`
        ).join('')}</div>`;
    }

    const html = fetta.map((item,idx) => cardHTML(item, inizio+idx)).join('');
    const mostraLoadMore = inizio + PER_PAGINA < totale;
    const rimanenti = totale - inizio - PER_PAGINA;

    if (reset) {
        resultDiv.innerHTML = `<div class="result-count">${labelTot}</div>${indiceHtml}<div id="cardList">${html}</div>`;
    } else {
        document.getElementById('cardList').insertAdjacentHTML('beforeend', html);
    }

    const oldBtn = document.getElementById('loadMoreWrap');
    if (oldBtn) oldBtn.remove();
    if (mostraLoadMore) {
        resultDiv.insertAdjacentHTML('beforeend',
            `<div class="load-more-wrap" id="loadMoreWrap">
                <button class="load-more-btn btn-secondary" onclick="caricaAltri()">
                    ⬇️ Carica altri ${Math.min(PER_PAGINA,rimanenti)} di ${rimanenti} rimasti
                </button>
             </div>`);
    }
}

function caricaAltri() {
    paginaCorrente++;
    renderRisultati(false);
}

function saltaALettera(lettera) {
    if (!rubricaDecifrata) return;

    // Filtra solo i contatti con quella lettera
    const filtrati = risultatiCorrente.filter(r => r.nome[0].toUpperCase() === lettera);
    if (filtrati.length === 0) return;

    // Aggiorna active sull'indice (lo ricostruiamo dopo il render)
    const lettereAttuali = [...new Set(risultatiCorrente.map(r => r.nome[0].toUpperCase()))].sort();

    // Mostra solo i contatti di quella lettera
    const resultDiv = document.getElementById('result');
    const labelTot  = filtrati.length === 1 ? 'Trovato 1 contatto' : `Trovati ${filtrati.length} contatti`;

    // Indice alfabetico con lettera attiva evidenziata
    const indiceHtml = `<div class="alpha-index">${lettereAttuali.map(l =>
        `<button class="alpha-btn${l===lettera?' active':''}" onclick="saltaALettera('${l}')">${l}</button>`
    ).join('')}</div>`;

    // Pulsante torna a tutti
    const tornaHtml = `<div style="text-align:center;margin-bottom:10px;">
        <button class="btn-secondary" style="display:inline-flex;width:auto;padding:8px 20px;gap:6px;" onclick="mostraTutti()">
            ← Tutti i contatti
        </button>
    </div>`;

    const html = filtrati.map((item,idx) => cardHTML(item, idx)).join('');
    resultDiv.innerHTML = `<div class="result-count">${labelTot}</div>${indiceHtml}${tornaHtml}<div id="cardList">${html}</div>`;
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── CARD ──────────────────────────────────────────────────────────────────────
function evidenziaTesto(testo, query) {
    if (!query || query.length < 2) return testo.replace(/</g,'&lt;');
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex   = new RegExp(`(${escaped})`, 'gi');
    return testo.replace(/</g,'&lt;').replace(regex, '<mark>$1</mark>');
}

function cardHTML(item, idx) {
    const haTel  = item.telefono && item.telefono.trim() !== '';
    const waUrl  = haTel ? 'https://wa.me/'+item.telefono.replace('+','') : '#';
    const telNum = haTel ? item.telefono : '';
    const ns     = item.nome.replace(/</g,'&lt;').replace(/"/g,'&quot;');

    const bottoni = haTel
        ? `<a href="tel:${telNum}" class="call-button">
               <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>Chiama
           </a>
           <button class="save-button" data-action="salva" data-tel="${item.telefono}" data-nome="${ns}">

           </button>
           <a href="${waUrl}" target="_blank" rel="noopener" class="whatsapp-button">
               <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893 0-3.189-1.248-6.189-3.515-8.464"/></svg>WhatsApp
           </a>`
        : `<span style="font-size:12px;opacity:.5;align-self:center;">Numero non disponibile</span>`;

    // Evidenzia testo cercato nel nome
    const nomeEvidenziato = ricercaCorrente
        ? evidenziaTesto(item.nome, rimuoviAccenti(ricercaCorrente.toLowerCase()).split(/\s+/).join(' '))
        : item.nome.replace(/</g,'&lt;');

    return `<div class="result-item fade-in" style="animation-delay:${Math.min(idx,9)*0.04}s">
        <div class="contact-info">
            <div class="contact-details">
                <strong>${nomeEvidenziato}</strong>
                <span class="${haTel?'':'no-phone'}">${haTel?item.telefono:'Numero non disponibile'}</span>
            </div>
            <div class="action-buttons">${bottoni}</div>
        </div>
    </div>`;
}

// ── SVUOTA RICERCA ────────────────────────────────────────────────────────────
function svuotaRicerca() {
    document.getElementById('searchInput').value='';
    document.getElementById('clearBtn').style.display='none';
    document.getElementById('result').innerHTML='';
    ricercaCorrente = '';
    document.getElementById('searchInput').focus();
}

// ── AZIONI CONTATTI ───────────────────────────────────────────────────────────
document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const tel    = btn.dataset.tel  || '';
    const nome   = btn.dataset.nome || '';
    if (action==='copia') {
        const n = tel.replace(/[^\d+]/g,'');
        navigator.clipboard.writeText(n)
            .then(()  => mostraNotifica('Copiato: <strong>'+n+'</strong>'))
            .catch(()  => mostraNotifica('Errore nella copia',true));
    }
    if (action==='salva') {
        const vcard=`BEGIN:VCARD
VERSION:3.0
FN:${nome}
TEL;TYPE=CELL:${tel}
END:VCARD`;
        const url=URL.createObjectURL(new Blob([vcard],{type:'text/vcard'}));
        const a=document.getElementById('vcardDownload');
        a.href=url; a.download=nome.replace(/[^a-zA-Z0-9]/g,'_')+'.vcf'; a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        mostraNotifica('File .vcf pronto per il salvataggio');
    }
});

// ── TOAST ────────────────────────────────────────────────────────────────────
function mostraNotifica(msg, isError=false) {
    document.querySelectorAll('.notification').forEach(n=>n.remove());
    const n=document.createElement('div');
    n.className='notification'+(isError?' error':'');
    n.innerHTML=msg; document.body.appendChild(n);
    setTimeout(()=>n.classList.add('show'),50);
    setTimeout(()=>{n.classList.remove('show');setTimeout(()=>n.remove(),300);},2600);
}

// ── RICERCA VOCALE ───────────────────────────────────────────────────────────
let recognition = null;
function avviaVoce() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { mostraNotifica('Ricerca vocale non supportata su questo browser.', true); return; }
    const btn = document.getElementById('voiceBtn');
    if (recognition) { recognition.stop(); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => { btn.classList.add('recording'); btn.innerHTML = '🔴 In ascolto...'; };
    recognition.onresult = (e) => {
        const testo = e.results[0][0].transcript;
        document.getElementById('searchInput').value = testo;
        document.getElementById('clearBtn').style.display = 'block';
        eseguiRicerca();
    };
    recognition.onerror = (e) => { mostraNotifica('Errore microfono: ' + e.error, true); };
    recognition.onend = () => {
        btn.classList.remove('recording');
        btn.innerHTML = '🎙️ Voce';
        recognition = null;
    };
    recognition.start();
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.getElementById('tesseraInput').addEventListener('keypress', e => { if(e.key==='Enter') verificaTessera(); });
document.getElementById('searchInput').addEventListener('keypress',  e => { if(e.key==='Enter') eseguiRicerca(); });
document.getElementById('searchInput').addEventListener('input', function() {
    document.getElementById('clearBtn').style.display = this.value ? 'block' : 'none';
});
['searchInput','tesseraInput'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('touchstart', () => { el.style.fontSize='16px'; }, {passive:true});
});
</script>
